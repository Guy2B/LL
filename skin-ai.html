<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lune Beauty – AI Skin Scan</title>

<!-- MediaPipe -->
https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js>
https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js

<style>
body{
  margin:0;
  background:#fffaf3;
  font-family:Inter,sans-serif;
}
#app{
  max-width:400px;
  margin:30px auto;
  text-align:center;
}
#stage{
  width:340px;
  height:340px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  border:3px solid #c9a86a;
  background:#000;
}
video, canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.controls{
  display:flex;
  gap:14px;
  justify-content:center;
  margin-top:16px;
}
button{
  padding:10px 20px;
  border-radius:16px;
  border:none;
  background:#c9a86a;
  color:white;
  font-weight:600;
}
button[disabled]{opacity:.4}
</style>
</head>

<body>

<div id="app">
  <div id="stage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");

/* ======================================================
   FACE SURFACE LINE MAP (REAL TOPOLOGY)
====================================================== */
const FACE_SURFACE_LINES = [
  [10,338,297,332,284,251,389,356,454],   // forehead
  [67,109,10,338,299,333,293],            // upper cheeks
  [234,93,132,58,172,136,150,149],        // cheeks
  [345,352,376,400,378,379],              // lower cheeks
  [152,377,400,378,379]                   // chin
];

/* ======================================================
   FACE OUTLINE (FOR CLIPPING)
====================================================== */
const FACE_OUTLINE = [
  10,338,297,332,284,251,389,356,454,323,
  361,288,397,365,379,378,400,377,152,
  148,176,149,150,136,172,58,132,93,234,
  127,162,21,54,103,67
];

function drawSurfaceCurve(ids, landmarks){
  ctx.beginPath();
  ids.forEach((id,i)=>{
    const p = landmarks[id];
    const x = p.x * canvas.width;
    const y = p.y * canvas.height;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });
  ctx.stroke();
}

function clipFace(landmarks){
  ctx.beginPath();
  FACE_OUTLINE.forEach((id,i)=>{
    const p = landmarks[id];
    const x = p.x * canvas.width;
    const y = p.y * canvas.height;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.clip();
}

/* ======================================================
   FACEMESH SETUP
====================================================== */
const faceMesh = new FaceMesh({
  locateFile: f => 
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

faceMesh.onResults(onResults);

/* ======================================================
   RENDER
====================================================== */
function onResults(res){
  if(!res.multiFaceLandmarks.length) return;

  const landmarks = res.multiFaceLandmarks[0];

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  clipFace(landmarks);

  /* GRID */
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.lineWidth = 1.6;

  FACE_SURFACE_LINES.forEach(line=>{
    drawSurfaceCurve(line, landmarks);
  });

  ctx.restore();

  captureBtn.disabled = false;
}

/* ======================================================
   CAMERA START – SAFE PATTERN
====================================================== */
startBtn.onclick = async ()=>{
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
  video.srcObject = stream;
  await new Promise(res=>video.onloadedmetadata=res);
  await video.play();

  const camera = new Camera(video,{
    onFrame: async()=>{ await faceMesh.send({image:video}); },
    width:640,height:640
  });
  camera.start();
};

</script>

</body>
</html>
``
