<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Lune Beauty – AI Skin Scanner</title>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  background:#fffaf3;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}
#app{
  max-width:420px;
  margin:32px auto;
  text-align:center;
}

/* SCAN STAGE */
#stage{
  width:340px;height:340px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  border:3px solid #c9a86a;
  background:#000;
}
video,canvas,img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
}

/* CONTROLS */
.controls{
  margin-top:16px;
  display:flex;
  gap:12px;
  justify-content:center;
}
button{
  padding:12px 24px;
  border-radius:18px;
  border:none;
  background:#c9a86a;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button[disabled]{opacity:.45}

/* STATE */
.state{
  margin-top:10px;
  font-size:14px;
}
.state.ok{color:#2f9e44}
.state.bad{color:#c92a2a}

/* REPORT */
#report{
  display:none;
  margin-top:28px;
  text-align:left;
}
.report-layout{
  display:flex;
  gap:16px;
}
.report-img{
  width:140px;height:180px;
  border-radius:16px;
  border:2px solid #c9a86a;
  overflow:hidden;
}
#score{
  font-size:46px;
  font-weight:600;
  color:#c9a86a;
}
.zone div{font-size:14px}

/* CTA */
.cta{
  margin-top:20px;
  padding:20px;
  border-radius:24px;
  background:linear-gradient(180deg,#fff,#faf6ef);
  box-shadow:0 16px 36px rgba(0,0,0,.12);
}
.cta-buttons{
  display:flex;
  gap:12px;
  margin-top:12px;
}
.cta a{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:18px;
  color:#fff;
  text-decoration:none;
  font-weight:600;
}
.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}
.meta{
  text-align:center;
  font-size:13px;
  margin-top:14px;
  color:#6b5c43;
}
</style>
</head>

<body>
<div id="app">

<!-- SCAN -->
<div id="scan">
  <div id="stage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>
  <div id="state" class="state bad">Kamera nicht gestartet</div>
  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>
</div>

<!-- REPORT -->
<div id="report">
  <h2>Ihr Haut‑Score</h2>
  <div class="report-layout">
    <div class="report-img">
      <img id="reportImage">
    </div>
    <div>
      <div id="score">–</div>
      <div class="zone">
        <div>Stirn: <span id="zForehead"></span></div>
        <div>Wangen: <span id="zCheeks"></span></div>
        <div>Kinn: <span id="zChin"></span></div>
      </div>
      <p id="recommendation"></p>
    </div>
  </div>

  <div class="cta">
    <p><strong>Für eine gezielte, individuelle Behandlung empfehlen wir eine persönliche Beratung bei Lune Beauty.</strong></p>
    <div class="cta-buttons">
      <a id="phoneBtn" class="phone" href="tel:+491791544002">Telefon</a>
      <a id="waBtn" class="whatsapp">WhatsApp</a>
    </div>
    <div class="meta">
      Öffnungszeiten: Mo–Fr 10–18 · Sa 10–16<br>
      <a href="https://www.lunebeauty.de">www.lunebeauty.de</a>
    </div>
  </div>
</div>

</div>

<script>
/* ===== STATE ===== */
const State={IDLE:0,TRACKING:1,READY:2,CAPTURING:3,FROZEN:4};
let state=State.IDLE;

/* ===== DOM ===== */
const video=document.getElementById("video");
const canvas=document.getElementById("overlay");
const ctx=canvas.getContext("2d");
const startBtn=document.getElementById("startBtn");
const captureBtn=document.getElementById("captureBtn");
const stateEl=document.getElementById("state");

const report=document.getElementById("report");
const reportImage=document.getElementById("reportImage");
const scoreEl=document.getElementById("score");
const zForehead=document.getElementById("zForehead");
zCheeks=document.getElementById("zCheeks");
zChin=document.getElementById("zChin");
const recommendationEl=document.getElementById("recommendation");
const waBtn=document.getElementById("waBtn");

/* ===== GRID MAP ===== */
const GRID=[[10,338,297,332,284,251,389,356,454],[234,93,132,58,172,136,150,149],[152,377,400,378,379]];

/* ===== FACEMESH ===== */
let lastFrame=null;
const faceMesh=new FaceMesh({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true});
faceMesh.onResults(res=>{
  if(state>=State.CAPTURING)return;
  if(!res.multiFaceLandmarks.length)return;

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="rgba(255,255,255,.9)";
  ctx.lineWidth=1.4;
  GRID.forEach(line=>{
    ctx.beginPath();
    line.forEach((id,i)=>{
      const p=res.multiFaceLandmarks[0][id];
      const x=p.x*canvas.width;
      const y=p.y*canvas.height;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  });

  lastFrame=canvas.toDataURL("image/png");
  state=State.READY;
  stateEl.textContent="✅ Aufnahme bereit";
  stateEl.className="state ok";
  captureBtn.disabled=false;
});

/* ===== START ===== */
startBtn.onclick=async()=>{
  if(state!==State.IDLE)return;
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
  video.srcObject=stream;
  await new Promise(r=>video.onloadedmetadata=r);
  await video.play();
  const cam=new Camera(video,{onFrame:async()=>faceMesh.send({image:video}),width:640,height:640});
  cam.start();
  state=State.TRACKING;
  stateEl.textContent="Gesicht wird erkannt…";
};

/* ===== SCORE LOGIC ===== */
function zoneScore(red,tex,wr){return Math.max(60,Math.round(100-(red*0.6+tex*0.4+wr*0.5)));}
function recommendation(s){
  if(s>=90)return"Sehr gute Hautbalance. Regelmäßige professionelle Pflege unterstützt den langfristigen Hauterhalt.";
