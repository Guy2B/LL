<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lune Beauty – AI Skin Analyzer</title>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
:root {
  --gold:#c9a86a;
  --bg:#fffaf3;
  --ok:#2f9e44;
  --bad:#c92a2a;
}

body{
  margin:0;
  background:var(--bg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

#app{
  max-width:420px;
  margin:28px auto;
  text-align:center;
}

/* ===== SCAN ===== */
#scanStage{
  width:340px;
  height:340px;
  margin:auto;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  border:3px solid var(--gold);
  background:#000;
}

video,canvas,#scanImage{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
}

#scanImage{ display:none }

/* ===== UI ===== */
.state{
  margin-top:10px;
  font-size:14px;
}
.state.ok{color:var(--ok)}
.state.bad{color:var(--bad)}

.controls{
  margin-top:16px;
  display:flex;
  gap:12px;
  justify-content:center;
}

button{
  padding:12px 22px;
  border-radius:18px;
  border:none;
  background:var(--gold);
  color:#fff;
  font-weight:600;
}
button[disabled]{opacity:.45}

/* ===== REPORT ===== */
#report{
  display:none;
  margin-top:28px;
  text-align:left;
}

.report-layout{
  display:flex;
  gap:16px;
}

.report-img{
  width:140px;
  height:180px;
  border-radius:16px;
  border:2px solid var(--gold);
  overflow:hidden;
}

#score{
  font-size:46px;
  font-weight:600;
  color:var(--gold);
}

.zone div{font-size:14px}

/* ===== CTA ===== */
.cta{
  margin-top:20px;
  padding:22px;
  border-radius:26px;
  background:linear-gradient(180deg,#fff,#faf6ef);
  box-shadow:0 16px 36px rgba(0,0,0,.12);
}

.cta-buttons{
  display:flex;
  gap:12px;
  margin-top:12px;
}

.cta-buttons a{
  flex:1;
  text-align:center;
  padding:14px;
  border-radius:18px;
  color:#fff;
  font-weight:600;
  text-decoration:none;
}

.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}

.meta{
  margin-top:14px;
  text-align:center;
  font-size:13px;
  color:#6b5c43;
}
</style>
</head>

<body>

<div id="app">

<!-- ===== SCAN ===== -->
<div id="scan">
  <div id="scanStage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <img id="scanImage">
  </div>

  <div id="state" class="state bad">Kamera nicht gestartet</div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>
</div>

<!-- ===== REPORT ===== -->
<div id="report">
  <h2>Ihr Haut‑Score</h2>

  <div class="report-layout">
    <div class="report-img" id="reportImageSlot"></div>

    <div>
      <div id="score">–</div>
      <div class="zone">
        <div>Stirn: <span id="zForehead"></span></div>
        <div>Wangen: <span id="zCheeks"></span></div>
        <div>Kinn: <span id="zChin"></span></div>
      </div>
      <p id="recommendation"></p>
    </div>
  </div>

  <div class="cta">
    <p><strong>Für eine gezielte, individuelle Behandlung empfehlen wir eine persönliche Beratung bei Lune Beauty.</strong></p>
    <div class="cta-buttons">
      <a class="phone" href="tel:+491791544002">Telefon</a>
      <a id="waBtn" class="whatsapp">WhatsApp</a>
    </div>
    <div class="meta">
      Öffnungszeiten: Mo–Fr 10–18 · Sa 10–16<br>
      <a href="https://www.lunebeauty.de" target="_blank">www.lunebeauty.de</a>
    </div>
  </div>
</div>

</div>

<script>
/* 👇 FINAL STATE-OF-THE-ART CORE 👇 */

/* ===== STATE ===== */
const State={IDLE:0,TRACKING:1,READY:2,FROZEN:3};
let state=State.IDLE;

/* ===== DOM ===== */
const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");
const scanImg = document.getElementById("scanImage");

const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");
const stateEl = document.getElementById("state");

const scanEl = document.getElementById("scan");
const reportEl = document.getElementById("report");
const reportSlot = document.getElementById("reportImageSlot");

const scoreEl = document.getElementById("score");
const zForehead = document.getElementById("zForehead");
const zCheeks = document.getElementById("zCheeks");
const zChin = document.getElementById("zChin");
const recEl = document.getElementById("recommendation");
const waBtn = document.getElementById("waBtn");

/* ===== FACE GEOMETRY ===== */
const FACE_SILHOUETTE=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67];
const SURFACE_BANDS=[
  [10,338,297,332,284,251,389,356,454],
  [67,109,10,338,299,333,293],
  [234,93,132,58,172,136,150,149],
  [345,352,376,400,378,379],
  [152,377,400,378,379]
];

function clipFace(lm){
  ctx.beginPath();
  FACE_SILHOUETTE.forEach((id,i)=>{
    const p=lm[id];
    i===0?ctx.moveTo(p.x*canvas.width,p.y*canvas.height)
         :ctx.lineTo(p.x*canvas.width,p.y*canvas.height);
  });
  ctx.closePath();
  ctx.clip();
}

/* ===== FACEMESH ===== */
let lastFrame=null;
let camera=null;

const faceMesh=new FaceMesh({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true});

faceMesh.onResults(res=>{
  if(state!==State.TRACKING) return;
  if(!res.multiFaceLandmarks.length) return;

  const lm=res.multiFaceLandmarks[0];
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  clipFace(lm);

  /* --- FUTURISTIC GRID --- */
  ctx.strokeStyle="rgba(255,255,255,0.9)";
  ctx.lineWidth=1.2;
  SURFACE_BANDS.forEach(b=>{
    ctx.beginPath();
    b.forEach((id,i)=>{
      const p=lm[id];
      i===0?ctx.moveTo(p.x*canvas.width,p.y*canvas.height)
           :ctx.lineTo(p.x*canvas.width,p.y*canvas.height);
    });
    ctx.stroke();
  });

  ctx.restore();

  lastFrame=canvas.toDataURL("image/png");
  state=State.READY;
  stateEl.textContent="✅ Aufnahme bereit";
  stateEl.className="state ok";
  captureBtn.disabled=false;
});

/* ===== CAMERA START ===== */
startBtn.onclick=async()=>{
  if(state!==State.IDLE) return;
  if(location.protocol!=="https:" && location.hostname!=="localhost"){
    alert("Bitte über https:// oder localhost öffnen.");
    return;
  }
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
  video.srcObject=stream;
  await new Promise(r=>video.onloadedmetadata=r);
  await video.play();

  camera=new Camera(video,{
    onFrame:async()=>faceMesh.send({image:video}),
    width:640,height:640
  });
  camera.start();

  state=State.TRACKING;
  stateEl.textContent="Gesicht wird erkannt…";
};

/* ===== SCORE ===== */
function zoneScore(r,t,w){
  return Math.max(60,Math.round(100-(r*0.6+t*0.4+w*0.5)));
}
function recommendation(s){
  if(s>=90)return"Sehr gute Hautbalance. Regelmäßige professionelle Pflege unterstützt den langfristigen Hauterhalt.";
  if(s>=80)return"Gute Hautstruktur mit leichter Sensitivität. Eine gezielte Behandlung kann Widerstandskraft und Textur verbessern.";
  return"Mehrere Belastungsindikatoren. Eine individuelle professionelle Behandlung ist empfehlenswert.";
}

/* ===== MORPH ===== */
function morph(img){
  const from=img.getBoundingClientRect();
  const to=reportSlot.getBoundingClientRect();

  img.style.position="fixed";
  img.style.top=from.top+"px";
  img.style.left=from.left+"px";
  img.style.width=from.width+"px";
  img.style.height=from.height+"px";
  document.body.appendChild(img);

  requestAnimationFrame(()=>{
    img.style.transition="all 700ms cubic-bezier(.4,0,.2,1)";
    img.style.top=to.top+"px";
    img.style.left=to.left+"px";
    img.style.width=to.width+"px";
    img.style.height=to.height+"px";
    img.style.borderRadius="16px";
  });
}

/* ===== CAPTURE ===== */
captureBtn.onclick=()=>{
  if(state!==State.READY) return;
  state=State.FROZEN;
  camera.stop();

  scanImg.src=lastFrame;
  scanImg.style.display="block";

  scanEl.style.display="none";
  reportEl.style.display="block";

  morph(scanImg);

  const f=zoneScore(8,6,6);
  const c=zoneScore(10,8,5);
  const ch=zoneScore(7,6,5);
  const total=Math.round((f+c+ch)/3);

  zForehead.textContent=f;
  zCheeks.textContent=c;
  zChin.textContent=ch;
  scoreEl.textContent=total;
  recEl.textContent=recommendation(total);

  waBtn.href=`https://wa.me/491791544002?text=${encodeURIComponent(
    "Hallo Lune Beauty, mein Haut‑Score beträgt "+total
  )}`;
};
</script>
</body>
</html>
``
