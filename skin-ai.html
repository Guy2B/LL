<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Lune Beauty – Hautanalyse</title>

<!-- Google Fonts (CORRECT) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fffaf3;
  --ink:#2f2a24;
  --gold:#c3a063;
  --gold-soft:#eadfcb;
}

/* BASE */
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--ink);
}
#app{
  max-width:420px;
  margin:24px auto 80px;
  padding:0 14px;
  text-align:center;
}
.screen{display:none}
.screen.active{display:block}

/* COMMON */
.badge{
  padding:6px 16px;
  border-radius:999px;
  background:#f4efe7;
  color:#7a6a4f;
  font-size:12px;
  margin-bottom:14px;
  display:inline-block;
}
h1{
  font-family:"Playfair Display";
  font-size:22px;
  margin:6px 0 10px;
}
.helper{
  font-size:14px;
  color:#6b5c43;
  margin-bottom:12px;
}

/* CAMERA */
#cameraCircle{
  width:300px;
  height:300px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  position:relative;
  background:#000;
  border:3px solid;
  border-image:linear-gradient(135deg,var(--gold),#efd8d1) 1;
}
video,canvas{
  width:100%;
  height:100%;
  object-fit:cover;
}
#hud{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.45;
}

/* CONTROLS */
.controls{margin-top:16px}
button{
  padding:14px 26px;
  border-radius:20px;
  border:none;
  background:linear-gradient(135deg,var(--gold),#e2c994);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button.secondary{
  margin-top:26px;
  background:#f3ede4;
  color:#6b5c43;
}

/* REPORT TRANSITION */
#report{
  opacity:0;
  transform:translateY(72px);
  pointer-events:none;
  transition:
    opacity .6s ease,
    transform .6s cubic-bezier(.2,.8,.2,1);
}
#report.active{
  opacity:1;
  transform:none;
  pointer-events:auto;
}

/* REPORT LAYOUT */
.report-hero{
  display:grid;
  grid-template-columns:1fr 150px;
  gap:18px;
  align-items:center;
  margin:16px 0;
}

.report-image{
  width:220px;
  height:280px;
  border-radius:30px;
  overflow:hidden;
  background:#000;
  box-shadow:0 18px 44px rgba(0,0,0,.18);
}
.report-image canvas{
  opacity:0;
  transform:scale(.92);
  transition:.6s cubic-bezier(.2,.8,.2,1);
}
.report-image canvas.visible{
  opacity:1;
  transform:scale(1);
}

/* SCORE */
.score-side{
  display:flex;
  flex-direction:column;
  align-items:center;
}
#scoreWrap{
  position:relative;
  width:150px;
  height:150px;
}
#scoreWrap canvas{
  position:absolute;
  inset:0;
}
#score{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Playfair Display";
  font-size:46px;
  color:var(--gold);
}
.score-label{
  font-size:12px;
  color:#6b5c43;
  margin-top:6px;
}

/* SUBSCORES */
.toggleSubs{
  font-size:13px;
  color:#7a6a4f;
  cursor:pointer;
  margin-top:8px;
}
.subscores{
  margin:14px;
  text-align:left;
  display:none;
}
.subscores.open{display:block}
.sub{
  display:grid;
  grid-template-columns:120px 1fr 36px;
  gap:10px;
  font-size:13px;
  color:#6b5c43;
  margin-bottom:10px;
}
.bar{
  height:6px;
  background:var(--gold-soft);
  border-radius:6px;
}
.bar span{
  display:block;
  height:100%;
  background:linear-gradient(90deg,var(--gold),#efd8d1);
}

/* CTA */
.cta-soft{
  margin-top:20px;
  padding:24px;
  border-radius:28px;
  background:#fff;
  box-shadow:0 20px 46px rgba(0,0,0,.14);
}
.cta-soft h3{
  font-family:"Playfair Display";
  font-size:18px;
  margin:0 0 6px;
}
.cta-soft p{
  font-size:13px;
  color:#6b5c43;
  margin-bottom:16px;
}
.cta-buttons{
  display:flex;
  gap:12px;
}
.cta-btn{
  flex:1;
  padding:14px;
  border-radius:18px;
  font-weight:600;
  color:#fff;
  text-decoration:none;
}
.phone{background:linear-gradient(135deg,var(--gold),#efd8d1)}
.whatsapp{background:#1dbf5f}
</style>
</head>

<body>
<div id="app">

<!-- SCAN -->
<div id="scan" class="screen active">
  <div class="badge">Professionelle Hautanalyse</div>
  <h1>Bereiten Sie Ihr Gesicht vor</h1>
  <div class="helper">Gleichmäßiges Licht · Ohne Make‑up empfohlen</div>

  <div id="cameraCircle">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="hud"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Analyse starten</button>
    <button id="captureBtn" disabled>Analyse abschließen</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div id="report">

    <div class="badge">Persönlicher Hautbericht</div>

    <div class="report-hero">
      <div class="report-image">
        <canvas id="finalImage"></canvas>
      </div>

      <div class="score-side">
        <div id="scoreWrap">
          <canvas id="scoreRing" width="150" height="150"></canvas>
          <div id="score">0</div>
        </div>
        <div class="score-label">Gesamthautzustand</div>
      </div>
    </div>

    <div class="toggleSubs" id="toggleSubs">Details anzeigen</div>
    <div class="subscores" id="subs"></div>

    <div class="cta-soft">
      <h3><a id="serviceLink" target="_blank"></a></h3>
      <p id="serviceText"></p>
      <div class="cta-buttons">
        <a class="cta-btn phone" href="tel:+491791544002">📞 Anrufen</a>
        <a class="cta-btn whatsapp" href="https://wa.me/491791544002">💬 WhatsApp</a>
      </div>
      <p style="font-size:12px;color:#8a7a63;margin-top:14px">
        Ihre Analyse ist vertraulich und wird nicht gespeichert.<br>
        <a href="https://www.lunebeauty.de" target="_blank">www.lunebeauty.de</a>
      </p>
    </div>

    <button class="secondary" onclick="location.reload()">Neue Analyse</button>
  </div>
</div>

</div>

<!-- MediaPipe (CORRECT) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video=document.getElementById("video");
const hud=document.getElementById("hud");
const hctx=hud.getContext("2d");
const finalCanvas=document.getElementById("finalImage");
const fctx=finalCanvas.getContext("2d");
const startBtn=document.getElementById("startBtn");
const captureBtn=document.getElementById("captureBtn");

let stream, cam, lastLandmarks;

/* DRAW GRID */
function drawMesh(lm,w,h){
  hctx.clearRect(0,0,w,h);
  hctx.strokeStyle="rgba(255,255,255,.45)";
  hctx.lineWidth=.6;
  FACEMESH_TESSELATION.forEach(([a,b])=>{
    const p1=lm[a],p2=lm[b];
    hctx.beginPath();
    hctx.moveTo(p1.x*w,p1.y*h);
    hctx.lineTo(p2.x*w,p2.y*h);
    hctx.stroke();
  });

  // LIVE SCORE PREVIEW
  const liveScore=Math.min(
    100,
    Math.round(Math.abs(lm[159].y-lm[145].y)*1200)
  );
  drawScorePreview(liveScore);
}

/* SCORE PREVIEW */
function drawScorePreview(val){
  const ctx=scoreRing.getContext("2d");
  ctx.clearRect(0,0,150,150);
  ctx.lineWidth=10;

  ctx.strokeStyle="#eee2d0";
  ctx.beginPath();
  ctx.arc(75,75,65,0,Math.PI*2);
  ctx.stroke();

  ctx.strokeStyle="rgba(195,160,99,.35)";
  ctx.beginPath();
  ctx.arc(75,75,65,-Math.PI/2,(val/100)*Math.PI*2-Math.PI/2);
  ctx.stroke();
}

/* START */
startBtn.onclick=async()=>{
  stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
  await video.play();

  const mesh=new FaceMesh({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  mesh.setOptions({maxNumFaces:1,refineLandmarks:true});
  mesh.onResults(r=>{
    if(!r.multiFaceLandmarks?.length)return;
    lastLandmarks=r.multiFaceLandmarks[0];
    hud.width=video.videoWidth;
    hud.height=video.videoHeight;
    drawMesh(lastLandmarks,hud.width,hud.height);
    captureBtn.disabled=false;
  });

  cam=new Camera(video,{onFrame:()=>mesh.send({image:video})});
  cam.start();
};

/* CAPTURE – FACE CORRECT, NO DISTORTION */
captureBtn.onclick=()=>{
  const W=220,H=280;
  finalCanvas.width=W;
  finalCanvas.height=H;

  let minX=1e9,minY=1e9,maxX=0,maxY=0;
  lastLandmarks.forEach(p=>{
    const x=p.x*video.videoWidth;
    const y=p.y*video.videoHeight;
    minX=Math.min(minX,x);
    minY=Math.min(minY,y);
    maxX=Math.max(maxX,x);
    maxY=Math.max(maxY,y);
  });

  const padX=(maxX-minX)*0.25;
  const padY=(maxY-minY)*0.35;
  const sx=Math.max(0,minX-padX);
  const sy=Math.max(0,minY-padY);
  const sw=Math.min(video.videoWidth,(maxX-minX)+padX*2);
  const sh=Math.min(video.videoHeight,(maxY-minY)+padY*2);

  fctx.save();
  fctx.beginPath();
  fctx.moveTo(30,0);
  fctx.arcTo(W,0,W,H,30);
  fctx.arcTo(W,H,0,H,30);
  fctx.arcTo(0,H,0,0,30);
  fctx.arcTo(0,0,W,0,30);
  fctx.clip();

  fctx.drawImage(video,sx,sy,sw,sh,0,0,W,H);
  fctx.drawImage(hud,sx,sy,sw,sh,0,0,W,H);
  fctx.restore();

  stream.getTracks().forEach(t=>t.stop());
  cam.stop();

  scan.classList.remove("active");
  result.classList.add("active");
  report.classList.add("active");
  finalCanvas.classList.add("visible");

  runAnalysis();
};

/* FINAL ANALYSIS */
function runAnalysis(){
  const sym=85, uni=70, tex=75, eye=60;

  subs.innerHTML=
    sub("Symmetrie",sym)+
    sub("Hautgleichmäßigkeit",uni)+
    sub("Textur",tex)+
    sub("Augenfrische",eye);

  animateScore(Math.round((sym+uni+tex+eye)/4));

  serviceLink.textContent="Empfohlene Behandlung: Skin Balance Treatment";
  serviceLink.href="https://www.lunebeauty.de";
  serviceText.textContent=
    "Diese Behandlung wurde anhand Ihrer individuellen Hautanalyse ausgewählt.";
}

function sub(label,val){
  return `<div class="sub">
    <div>${label}</div>
    <div class="bar"><span style="width:${val}%"></span></div>
    <div>${val}</div>
  </div>`;
}

/* FINAL SCORE ANIMATION */
function animateScore(val){
  const ctx=scoreRing.getContext("2d");
  let p=0;
  (function loop(){
    ctx.clearRect(0,0,150,150);
    ctx.lineWidth=12;

    ctx.strokeStyle="#eee2d0";
    ctx.beginPath();
    ctx.arc(75,75,65,0,Math.PI*2);
    ctx.stroke();

    ctx.strokeStyle="var(--gold)";
    ctx.beginPath();
    ctx.arc(75,75,65,-Math.PI/2,(p/100)*Math.PI*2-Math.PI/2);
    ctx.stroke();

    p+=(val-p)*0.1;
    score.textContent=Math.round(p);
    if(Math.abs(val-p)>0.5)requestAnimationFrame(loop);
  })();
}

/* TOGGLE SUBSCORES */
toggleSubs.onclick=()=>{
  subs.classList.toggle("open");
  toggleSubs.textContent=subs.classList.contains("open")
    ?"Details ausblenden":"Details anzeigen";
};
</script>
</body>
</html>
