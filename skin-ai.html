<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lune Beauty – AI Skin Scan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a86a;
  --gold-soft:rgba(201,168,106,.3);
  --bg:#fffaf3;
  --ink:#2f2a24;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--ink);
  text-align:center;
}

#app{
  max-width:420px;
  margin:32px auto 64px;
}

.badge{
  display:inline-block;
  padding:6px 16px;
  border-radius:999px;
  background:rgba(201,168,106,.16);
  color:#6f5d3d;
  font-size:12px;
  margin-bottom:18px;
}

/* ===== VIEWER ===== */
#viewer{
  width:300px;
  height:380px; /* portrait head frame */
  margin:0 auto 20px;
  border-radius:28px;
  background:#000;
  border:2px solid var(--gold);
  overflow:hidden;
  position:relative;
  transition:.6s ease;
}

#viewer.morph{
  width:190px;
  height:260px;
}

video,canvas,img{
  width:100%;
  height:100%;
  object-fit:cover;
}

canvas{position:absolute;inset:0;pointer-events:none}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  gap:14px;
  justify-content:center;
  margin-bottom:18px;
}

button{
  padding:12px 26px;
  border-radius:999px;
  border:none;
  background:var(--gold);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button:disabled{opacity:.45}

/* ===== REPORT ===== */
#report{
  opacity:0;
  transform:translateY(32px);
  transition:.6s ease;
  pointer-events:none;
}
#report.active{
  opacity:1;
  transform:none;
  pointer-events:auto;
}

.score{
  font-family:"Playfair Display",serif;
  font-size:56px;
  color:var(--gold);
  margin:10px 0;
}

.reco{
  max-width:300px;
  margin:0 auto 18px;
  font-size:14px;
  line-height:1.55;
  color:#5f5240;
}

/* ===== CTA ===== */
.premium-cta{
  margin-top:20px;
  padding:22px;
  border-radius:26px;
  background:linear-gradient(180deg,#fff,#faf6ef);
  box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.premium-cta strong{
  font-family:"Playfair Display",serif;
  font-size:18px;
}

.cta-buttons{
  display:flex;
  gap:14px;
  margin-top:14px;
}
.cta{
  flex:1;
  padding:14px 0;
  border-radius:18px;
  font-weight:600;
  color:#fff;
  text-decoration:none;
}
.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}

.meta{
  font-size:12px;
  color:#6b5c43;
  margin-top:12px;
}
.meta a{
  color:#6b5c43;
  text-decoration:none;
}
.meta a:hover{text-decoration:underline}
</style>
</head>

<body>
<div id="app">

  <div class="badge">Advanced AI Skin Scan</div>

  <div id="viewer">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="hud"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>

  <div id="report">
    <div class="badge">Ihr Haut‑Score</div>
    <div id="score" class="score"></div>
    <div id="diagnosis" class="reco"></div>

    <div class="premium-cta">
      <strong>Individueller Behandlungsplan</strong>
      <div class="cta-buttons">
        <a class="cta phone" href="tel:+491791544002">📞 Telefon</a>
        <a class="cta whatsapp" id="waBtn" target="_blank">💬 WhatsApp</a>
      </div>
      <div class="meta">
        Mo–Fr 10–18 · Sa 10–16<br>
        <a href="https://www.lunebeauty.de" target="_blank">www.lunebeauty.de</a>
      </div>
    </div>

    <div class="controls" style="margin-top:20px">
      <button id="restartBtn">Neue Analyse</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const hud = document.getElementById("hud");
const viewer = document.getElementById("viewer");
const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");
const report = document.getElementById("report");

let stream, faceMesh, cam, captured=false, lastLandmarks=null;
let scans=0;

const T = FACEMESH_TESSELATION;

/* Live mesh (unchanged) */
function onFace(res){
  if(captured) return;

  const ctx = hud.getContext("2d");
  hud.width = hud.clientWidth;
  hud.height = hud.clientHeight;
  ctx.clearRect(0,0,hud.width,hud.height);

  if(!res.multiFaceLandmarks){
    captureBtn.disabled = true;
    return;
  }
  captureBtn.disabled = false;
  lastLandmarks = res.multiFaceLandmarks[0];

  ctx.strokeStyle="rgba(201,168,106,.9)";
  ctx.lineWidth=.6;

  T.forEach(([a,b])=>{
    const p1=lastLandmarks[a], p2=lastLandmarks[b];
    ctx.beginPath();
    ctx.moveTo(p1.x*hud.width,p1.y*hud.height);
    ctx.lineTo(p2.x*hud.width,p2.y*hud.height);
    ctx.stroke();
  });
}

/* Start */
startBtn.onclick = async ()=>{
  stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;

  faceMesh = new FaceMesh({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true});
  faceMesh.onResults(onFace);

  cam = new Camera(video,{onFrame:()=>!captured&&faceMesh.send({image:video})});
  cam.start();
};

/* Capture with head-like frame */
captureBtn.onclick = ()=>{
  captured=true;

  const w=hud.width,h=hud.height;
  const xs=lastLandmarks.map(p=>p.x*w);
  const ys=lastLandmarks.map(p=>p.y*h);

  let minX=Math.min(...xs), maxX=Math.max(...xs);
  let minY=Math.min(...ys), maxY=Math.max(...ys);

  // head framing
  const padX=40;
  const padTop=70;
  const padBottom=30;

  minX=Math.max(0,minX-padX);
  maxX=Math.min(w,maxX+padX);
  minY=Math.max(0,minY-padTop);
  maxY=Math.min(h,maxY+padBottom);

  const snap=document.createElement("canvas");
  snap.width=maxX-minX;
  snap.height=maxY-minY;

  const sctx=snap.getContext("2d");
  sctx.drawImage(
    video,
    minX/w*video.videoWidth,
    minY/h*video.videoHeight,
    snap.width/w*video.videoWidth,
    snap.height/h*video.videoHeight,
    0,0,snap.width,snap.height
  );
  sctx.drawImage(hud,minX,minY,snap.width,snap.height,0,0,snap.width,snap.height);

  stream.getTracks().forEach(t=>t.stop());
  cam.stop();

  viewer.innerHTML="";
  const img=new Image(); img.src=snap.toDataURL();
  viewer.appendChild(img);
  viewer.classList.add("morph");

  const score=88; // deterministic placeholder
  document.getElementById("score").textContent=score;

  let diagnosis =
    score>90
    ? "Die Haut zeigt eine außergewöhnlich ausgeglichene Struktur mit hoher Ebenmäßigkeit und minimalen Stressanzeichen."
    : score>80
    ? "Die Haut wirkt insgesamt sehr harmonisch. Leichte Anzeichen von Sensibilität und Feuchtigkeitsbedarf lassen sich im Wangen‑ und Stirnbereich erkennen."
    : "Es zeigen sich erste Anzeichen von Ungleichgewicht in Textur und Feuchtigkeitsverteilung.";

  document.getElementById("diagnosis").textContent=diagnosis;

  waBtn.href=`https://wa.me/491791544002?text=Mein%20Haut-Score%20ist%20${score}`;
  report.classList.add("active");
};

/* Restart / limit */
restartBtn.onclick = ()=>{
  scans++;
  if(scans>=2){
    document.body.style.opacity=".4";
    setTimeout(()=>location.href="https://www.lunebeauty.de",600);
  } else location.reload();
};
</script>
</body>
</html>
