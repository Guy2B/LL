<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Skin AI – Working FaceMesh</title>

<!-- ✅ CORRECT SCRIPT LOADING -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.jsript src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  background:#fffaf3;
  font-family:system-ui, sans-serif;
}

#app{
  max-width:400px;
  margin:40px auto;
  text-align:center;
}

#stage{
  width:340px;
  height:340px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  position:relative;
  border:3px solid #c9a86a;
  background:#000;
}

video, canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.controls{
  margin-top:16px;
  display:flex;
  gap:12px;
  justify-content:center;
}

button{
  padding:10px 20px;
  border-radius:14px;
  border:none;
  background:#c9a86a;
  color:#fff;
  font-weight:600;
}
button[disabled]{opacity:.4}
</style>
</head>

<body>

<div id="app">
  <div id="stage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");

/* ✅ SURFACE GRID MAP */
const SURFACE_LINES = [
  [10,338,297,332,284,251,389,356,454], // forehead
  [67,109,10,338,299,333,293],          // upper face
  [234,93,132,58,172,136,150,149],      // cheeks
  [345,352,376,400,378,379],            // lower cheeks
  [152,377,400,378,379]                 // chin
];

/* ✅ FACE OUTLINE FOR CLIPPING */
const FACE_MASK = [
  10,338,297,332,284,251,389,356,454,323,
  361,288,397,365,379,378,400,377,152,
  148,176,149,150,136,172,58,132,93,234,
  127,162,21,54,103,67
];

function clipFace(landmarks){
  ctx.beginPath();
  FACE_MASK.forEach((id,i)=>{
    const p = landmarks[id];
    const x = p.x * canvas.width;
    const y = p.y * canvas.height;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.clip();
}

function drawCurve(ids, landmarks){
  ctx.beginPath();
  ids.forEach((id,i)=>{
    const p = landmarks[id];
    const x = p.x * canvas.width;
    const y = p.y * canvas.height;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
}

/* ✅ FACEMESH */
const faceMesh = new FaceMesh({
  locateFile: f =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});

faceMesh.setOptions({
  maxNumFaces:1,
  refineLandmarks:true,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});

faceMesh.onResults(results=>{
  if(!results.multiFaceLandmarks.length) return;

  const lm = results.multiFaceLandmarks[0];

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  clipFace(lm);

  ctx.strokeStyle = "rgba(255,255,255,0.9)";
  ctx.lineWidth = 1.6;

  SURFACE_LINES.forEach(line=>{
    drawCurve(line, lm);
  });

  ctx.restore();

  captureBtn.disabled = false;
});

/* ✅ START CAMERA */
startBtn.onclick = async ()=>{
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"user"}
  });

  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();

  const cam = new Camera(video,{
    onFrame: async ()=>{ await faceMesh.send({image:video}); },
    width:640,
    height:640
  });
  cam.start();
};
</script>

</body>
</html>
``
