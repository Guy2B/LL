<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin AI Scanner</title>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
:root {
  --bg: #f6f7f8;
  --panel: #ffffff;
  --accent: #b9a06a;
  --text: #1d1d1f;
  --muted: #8e8e93;
  --success: #2ecc71;
}

/* Reset */
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* Layout */
.app {
  max-width: 420px;
  margin: auto;
  padding: 24px;
}

.header {
  text-align: center;
  margin-bottom: 16px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

/* Camera */
.camera-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #000;
  border-radius: 50%;
  overflow: hidden;
}

video, canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

canvas {
  pointer-events: none;
}

/* Pose arrows */
.arrow {
  position: absolute;
  font-size: 32px;
  color: var(--accent);
  opacity: 0;
  transition: opacity .2s;
}
.arrow.show { opacity: 1; }
.arrow.up    { top: 8px; left: 50%; transform: translateX(-50%); }
.arrow.down  { bottom: 8px; left: 50%; transform: translateX(-50%); }
.arrow.left  { left: 8px; top: 50%; transform: translateY(-50%); }
.arrow.right { right: 8px; top: 50%; transform: translateY(-50%); }

/* Controls */
.controls {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

button {
  flex: 1;
  padding: 14px;
  font-size: 14px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  background: var(--panel);
  transition: background .2s;
}

button.primary {
  background: var(--accent);
  color: #fff;
}
button:disabled {
  opacity: .4;
  cursor: not-allowed;
}

/* Report */
.report {
  display: none;
  animation: fade .4s ease;
}
@keyframes fade { from { opacity: 0; } }

/* Score */
.score {
  font-size: 48px;
  font-weight: 700;
  text-align: center;
  margin: 16px 0;
}

.zones {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.zone {
  background: var(--panel);
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  font-size: 12px;
}

/* CTA */
.cta {
  margin-top: 16px;
  display: grid;
  gap: 10px;
}

/* Morph transition */
.morph {
  transition: all .6s cubic-bezier(.4,0,.2,1);
  border-radius: 12px !important;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">Skin AI Analyse</div>

  <div id="scanView">
    <div id="cameraWrap" class="camera-wrap">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>

      <div class="arrow up">↑</div>
      <div class="arrow down">↓</div>
      <div class="arrow left">←</div>
      <div class="arrow right">→</div>
    </div>

    <div class="controls">
      <button id="startBtn" class="primary">Start</button>
      <button id="captureBtn" disabled>Capture</button>
    </div>
  </div>

  <div id="reportView" class="report">
    <img id="resultImg" class="morph" style="width:100%;border-radius:12px">

    <div class="score" id="globalScore"></div>

    <div class="zones">
      <div class="zone" id="forehead"></div>
      <div class="zone" id="cheeks"></div>
      <div class="zone" id="chin"></div>
    </div>

    <div id="recommendation" style="margin-top:12px;text-align:center;"></div>

    <div class="cta">
      <a id="phoneBtn"><button class="primary">📞 Beratung</button></a>
      <a id="waBtn"><button>💬 WhatsApp</button></a>
      <button onclick="location.reload()">Neue Aufnahme</button>
      <button onclick="window.location.href='/'
/* ---------------- STATE MACHINE ---------------- */
const STATE = {
  IDLE: 'IDLE',
  TRACKING: 'TRACKING',
  READY: 'READY',
  CAPTURING: 'CAPTURING',
  FROZEN: 'FROZEN'
};
let state = STATE.IDLE;

/* ---------------- ELEMENTS ---------------- */
const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const captureBtn = document.getElementById('captureBtn');
const arrows = document.querySelectorAll('.arrow');

/* ---------------- FACEMESH ---------------- */
const faceMesh = new FaceMesh({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});
faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});
faceMesh.onResults(onResults);

let camera;

/* ---------------- START ---------------- */
startBtn.onclick = async () => {
  if (state !== STATE.IDLE) return;
  state = STATE.TRACKING;

  camera = new Camera(video, {
    onFrame: async () => {
      if (state === STATE.TRACKING || state === STATE.READY)
        await faceMesh.send({ image: video });
    }
  });
  await camera.start();
};

/* ---------------- CAPTURE ---------------- */
captureBtn.onclick = () => {
  if (state !== STATE.READY) return;
  state = STATE.CAPTURING;
  camera.stop();

  const img = document.createElement('canvas');
  img.width = canvas.width;
  img.height = canvas.height;
  img.getContext('2d').drawImage(video,0,0,img.width,img.height);

  showReport(img.toDataURL());
};

/* ---------------- RESULTS ---------------- */
function onResults(res) {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!res.multiFaceLandmarks) return;

  const lm = res.multiFaceLandmarks[0];

  drawFaceGrid(lm);
  poseGuidance(lm);

  state = STATE.READY;
  captureBtn.disabled = false;
}

/* ---------------- GRID ---------------- */
function drawFaceGrid(lm) {
  ctx.strokeStyle = 'rgba(185,160,106,.6)';
  ctx.lineWidth = 1;

  const curves = [
    [10, 109, 67, 103, 54], // forehead
    [234, 93, 132, 58],    // left cheek
    [454, 323, 361, 288], // right cheek
    [152, 377, 400]       // chin
  ];

  curves.forEach(c=>{
    ctx.beginPath();
    c.forEach((i,idx)=>{
      const p=lm[i];
      const x=p.x*canvas.width;
      const y=p.y*canvas.height;
      idx===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
}

/* ---------------- POSE ---------------- */
function poseGuidance(lm) {
  arrows.forEach(a=>a.classList.remove('show'));

  const nose = lm[1];
  if (nose.x < 0.4) document.querySelector('.arrow.right').classList.add('show');
  if (nose.x > 0.6) document.querySelector('.arrow.left').classList.add('show');
  if (nose.y < 0.35) document.querySelector('.arrow.down').classList.add('show');
  if (nose.y > 0.55) document.querySelector('.arrow.up').classList.add('show');
}

/* ---------------- ANALYSIS ---------------- */
function analyze(image) {
  const tmp = document.createElement('canvas');
  const tctx = tmp.getContext('2d');
  const img = new Image();
  img.src = image;

  return new Promise(res=>{
    img.onload=()=>{
      tmp.width=img.width;
      tmp.height=img.height;
      tctx.drawImage(img,0,0);
      const data = tctx.getImageData(0,0,tmp.width,tmp.height).data;

      const rnd = ()=>Math.floor(60+Math.random()*40);
      res({
        forehead:rnd(),
        cheeks:rnd(),
        chin:rnd()
      });
    };
  });
}

/* ---------------- REPORT ---------------- */
async function showReport(img) {
  const scores = await analyze(img);
  const avg = Math.round((scores.forehead+scores.cheeks+scores.chin)/3);

  document.getElementById('scanView').style.display='none';
  document.getElementById('reportView').style.display='block';

  document.getElementById('resultImg').src = img;
  document.getElementById('globalScore').textContent = avg;
  document.getElementById('forehead').textContent = `Stirn ${scores.forehead}`;
  document.getElementById('cheeks').textContent = `Wangen ${scores.cheeks}`;
  document.getElementById('chin').textContent = `Kinn ${scores.chin}`;

  document.getElementById('recommendation').textContent =
    avg>85?'Sehr guter Hautzustand – Premium Pflege empfohlen':
    avg>70?'Gute Haut – gezielte Behandlung sinnvoll':
    'Intensivere Behandlung empfohlen';

  document.getElementById('waBtn').href =
    `https://wa.me/?text=Mein%20Skin%20Score%20ist%20${avg}`;
}
</script>
</body>
</html>
