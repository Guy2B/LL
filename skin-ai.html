<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skin AI Scanner</title>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
:root {
  --bg:#f6f7f8;
  --panel:#fff;
  --accent:#b9a06a;
  --text:#1d1d1f;
  --muted:#8e8e93;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
  color:var(--text)
}

.app{
  max-width:430px;
  margin:auto;
  padding:24px
}

.header{
  text-align:center;
  font-weight:600;
  margin-bottom:16px
}

.camera-wrap{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  background:#000;
  border-radius:50%;
  overflow:hidden
}

video,canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover
}

canvas{pointer-events:none}

.arrow{
  position:absolute;
  font-size:32px;
  color:var(--accent);
  opacity:0;
  transition:.2s
}
.arrow.show{opacity:1}
.arrow.up{top:6px;left:50%;transform:translateX(-50%)}
.arrow.down{bottom:6px;left:50%;transform:translateX(-50%)}
.arrow.left{left:6px;top:50%;transform:translateY(-50%)}
.arrow.right{right:6px;top:50%;transform:translateY(-50%)}

.controls{display:flex;gap:12px;margin-top:16px}
button{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  font-weight:600;
  cursor:pointer
}
button.primary{background:var(--accent);color:#fff}
button:disabled{opacity:.4;cursor:not-allowed}

.report{display:none}
.score{font-size:46px;text-align:center;margin:16px 0}
.zones{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.zone{background:var(--panel);border-radius:10px;padding:10px;text-align:center;font-size:13px}

.cta{display:grid;gap:8px;margin-top:14px}

img.morph{width:100%;border-radius:14px;transition:.6s}
</style>
</head>

<body>
<div class="app">

<div class="header">Skin AI Analyse</div>

<!-- SCAN VIEW -->
<div id="scanView">
  <div class="camera-wrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>

    <div class="arrow up">↑</div>
    <div class="arrow down">↓</div>
    <div class="arrow left">←</div>
    <div class="arrow right">→</div>
  </div>

  <div class="controls">
    <button id="startBtn" class="primary">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>
</div>

<!-- REPORT -->
<div id="reportView" class="report">
  <img id="resultImg" class="morph"/>

  <div class="score" id="globalScore"></div>

  <div class="zones">
    <div class="zone" id="forehead"></div>
    <div class="zone" id="cheeks"></div>
    <div class="zone" id="chin"></div>
  </div>

  <div id="recommendation" style="margin-top:12px;text-align:center"></div>

  <div class="cta">
    <a id="phoneBtn" href="tel:+491234567"><button class="primary">📞 Beratung</button></a>
    <a id="waBtn"><button>💬 WhatsApp</button></a>
    <button onclick="location.reload()">Neue Aufnahme</button>
    <button onclick="location.href='/'========= */
const STATE={IDLE:0,TRACKING:1,READY:2,CAPTURING:3,FROZEN:4};
let state=STATE.IDLE;

/* ===================== ELEMENTS ===================== */
const video=document.getElementById('video');
const canvas=document.getElementById('overlay');
const ctx=canvas.getContext('2d');
const startBtn=document.getElementById('startBtn');
const captureBtn=document.getElementById('captureBtn');
const arrows=document.querySelectorAll('.arrow');

/* ===================== FACEMESH ===================== */
const faceMesh=new FaceMesh({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});
faceMesh.setOptions({
  maxNumFaces:1,
  refineLandmarks:true,
  minDetectionConfidence:.6,
  minTrackingConfidence:.6
});
faceMesh.onResults(onResults);

let camera;

/* ===================== TOPOLOGY ===================== */
/* Full official MediaPipe triangle list is REQUIRED.
   PLACE IT HERE VERBATIM in production. */
const FACEMESH_TRIANGLES = self.FACEMESH_TRIANGLES || [];

/* Canonical silicone silhouette */
const FACE_SILHOUETTE=[
  10,338,297,332,284,251,389,356,454,
  323,361,288,397,365,379,378,400,
  377,152,148,176,149,150,136,
  172,58,132,93,234,127,162,21,54
];

/* ===================== START ===================== */
startBtn.onclick=async()=>{
  if(state!==STATE.IDLE) return;
  state=STATE.TRACKING;

  camera=new Camera(video,{
    onFrame:async()=>{
      if(state===STATE.TRACKING||state===STATE.READY)
        await faceMesh.send({image:video});
    }
  });
  await camera.start();
};

/* ===================== CAPTURE ===================== */
captureBtn.onclick=()=>{
  if(state!==STATE.READY) return;
  state=STATE.CAPTURING;
  camera.stop();

  const snap=document.createElement('canvas');
  snap.width=canvas.width;
  snap.height=canvas.height;
  snap.getContext('2d').drawImage(video,0,0,snap.width,snap.height);

  analyzeAndReport(snap);
};

/* ===================== RENDER ===================== */
function onResults(res){
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!res.multiFaceLandmarks) return;

  const lm=res.multiFaceLandmarks[0];

  renderFace(lm);

  const conf=orientationConfidence(faceOrientation(lm));
  captureBtn.disabled=conf<.85;
  state=conf>=.85?STATE.READY:STATE.TRACKING;

  showPoseArrows(lm);
}

function renderFace(lm){
  ctx.save();
  ctx.beginPath();
  FACE_SILHOUETTE.forEach((i,n)=>{
    const p=lm[i];
    const x=p.x*canvas.width,y=p.y*canvas.height;
    n?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });
  ctx.closePath();
  ctx.clip();

  ctx.strokeStyle='rgba(185,160,106,.4)';
  ctx.lineWidth=.4;

  for(const t of FACEMESH_TRIANGLES){
    const a=lm[t[0]],b=lm[t[1]],c=lm[t[2]];
    ctx.beginPath();
    ctx.moveTo(a.x*canvas.width,a.y*canvas.height);
    ctx.lineTo(b.x*canvas.width,b.y*canvas.height);
    ctx.lineTo(c.x*canvas.width,c.y*canvas.height);
    ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();
}

/* ===================== POSE ===================== */
function faceOrientation(lm){
  const le=lm[33],re=lm[263],n=lm[1],c=lm[152];
  return{
    yaw:n.x-(le.x+re.x)/2,
    pitch:n.y-c.y,
    roll:Math.atan2(re.y-le.y,re.x-le.x)
  };
}
function orientationConfidence(o){
  const y=Math.max(0,1-Math.abs(o.yaw)/.08);
  const p=Math.max(0,1-Math.abs(o.pitch)/.12);
  const r=Math.max(0,1-Math.abs(o.roll)/.25);
  return .4*y+.4*p+.2*r;
}
function showPoseArrows(lm){
  arrows.forEach(a=>a.classList.remove('show'));
  const n=lm[1];
  if(n.x<.4)document.querySelector('.arrow.right').classList.add('show');
  if(n.x>.6)document.querySelector('.arrow.left').classList.add('show');
  if(n.y<.35)document.querySelector('.arrow.down').classList.add('show');
  if(n.y>.55)document.querySelector('.arrow.up').classList.add('show');
}

/* ===================== ANALYSIS ===================== */
function analyzeAndReport(canvasSnap){
  const ctx2=canvasSnap.getContext('2d');
  const data=ctx2.getImageData(0,0,canvasSnap.width,canvasSnap.height);
  const imgData=data.data;

  /* Lighting normalization */
  const lighting=estimateLighting(data,canvasSnap.width,canvasSnap.height);
  const norm=normalizeLighting(data,lighting,canvasSnap.width,canvasSnap.height);

  const zones={
    forehead:computeScore(norm),
    cheeks:computeScore(norm),
    chin:computeScore(norm)
  };

  const avg=Math.round(
    (zones.forehead+zones.cheeks+zones.chin)/3
  );

  showReport(canvasSnap.toDataURL(),zones,avg);
}

/* Deterministic metrics */
function computeScore(pixels){
  const r=Math.min(15,redness(pixels));
  const t=Math.min(120,texture(pixels));
  const w=Math.min(30,wrinkles(pixels));
  return Math.round(
    (100-(r/15)*40)*.4+
    (100-(t/120)*40)*.3+
    (100-(w/30)*40)*.3
  );
}
function redness(p){
  let s=0;for(let i=0;i<p.length;i+=4)s+=Math.max(0,p[i]-p[i+1]);
  return s/(p.length/4);
}
function texture(p){
  let l=[],m=0;
  for(let i=0;i<p.length;i+=4){
    const v=.2126*p[i]+.7152*p[i+1]+.0722*p[i+2];
    l.push(v);m+=v;
  }
  m/=l.length;
  return l.reduce((a,v)=>a+(v-m)**2,0)/l.length;
}
function wrinkles(p){
  let e=0;
  for(let i=4;i<p.length-4;i+=4)
    e+=Math.abs(p[i]-p[i-4]);
  return e/(p.length/4);
}

/* ===================== REPORT ===================== */
function showReport(img,z,avg){
  document.getElementById('scanView').style.display='none';
  document.getElementById('reportView').style.display='block';
  document.getElementById('resultImg').src=img;
  document.getElementById('globalScore').textContent=avg;
  document.getElementById('forehead').textContent='Stirn '+z.forehead;
  document.getElementById('cheeks').textContent='Wangen '+z.cheeks;
  document.getElementById('chin').textContent='Kinn '+z.chin;
  document.getElementById('recommendation').textContent=
    avg>85?'Sehr guter Hautzustand':
    avg>70?'Guter Hautzustand – gezielte Pflege':
    'Intensivere Behandlung empfohlen';
  document.getElementById('waBtn').href=
    `https://wa.me/?text=Mein%20Skin%20Score:%20${avg}`;
}
</script>
</body>
</html>
