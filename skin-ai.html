<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lune Beauty – Skin Scanner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#fffaf3;
  color:#2f2a24;
}
#app{
  max-width:400px;
  margin:32px auto;
  text-align:center;
}
.badge{
  padding:6px 14px;
  border-radius:999px;
  background:#f4efe7;
  color:#7a6a4f;
  font-size:12px;
  display:inline-block;
  margin-bottom:14px;
}
#cameraCircle{
  width:320px;
  height:320px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  position:relative;
  background:#000;
  border:3px solid #c9a86a;
}
video,canvas{
  width:100%;
  height:100%;
  object-fit:cover;
}
#hud{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.controls{
  margin-top:16px;
  display:flex;
  gap:10px;
  justify-content:center;
}
button{
  padding:11px 18px;
  border-radius:14px;
  border:none;
  background:#c9a86a;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button.secondary{
  background:#f2ebe2;
  color:#7a6a4f;
}
.screen{display:none}
.screen.active{display:block}
#score{
  font-size:48px;
  font-weight:600;
  color:#c9a86a;
  margin:6px 0;
}
.result-text{
  font-size:15px;
  line-height:1.5;
  margin:8px 22px 18px;
}
.cta-soft{
  margin-top:20px;
  padding:18px;
  border-radius:22px;
  background:#fff;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
}
.cta-buttons{
  display:flex;
  gap:10px;
  margin-top:12px;
}
.cta-btn{
  flex:1;
  padding:12px 0;
  border-radius:14px;
  text-decoration:none;
  font-weight:600;
  color:#fff;
}
.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}
.meta{
  font-size:12px;
  color:#6b5c43;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<!-- SCAN -->
<div id="scan" class="screen active">
  <div id="modeLabel" class="badge">Checking mode…</div>

  <div id="cameraCircle">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>
    <canvas id="hud"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn">Capture</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="badge">Ihr Haut‑Score</div>
  <div id="score"></div>

  <div class="result-text" id="resultText"></div>

  <div class="cta-soft">
    <div class="cta-buttons">
      <a id="phoneBtn" class="cta-btn phone">Telefon</a>
      <a id="waBtn" class="cta-btn whatsapp">WhatsApp</a>
    </div>
    <div class="meta">
      Öffnungszeiten: Mo–Fr 10–18 Uhr · Sa 10–16 Uhr<br>
      Website: <a href="/skin-ai.html" target="_self">www.lunebeauty.de</a>
    </div>
  </div>

  <div style="margin-top:14px">
    <button class="secondary" onclick="location.reload()">Neue Analyse starten</button>
  </div>
</div>

</div>

<!-- MediaPipe (only used when available) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ================= ENV ================= */
const IS_LOCAL = location.protocol === "file:";
const HAS_FACEMESH = typeof window.FaceMesh !== "undefined";
const USE_AI = !IS_LOCAL && HAS_FACEMESH;

modeLabel.textContent = USE_AI
  ? "Advanced AI Skin Scan"
  : "Local Skin Surface Mode";

/* ================= DOM ================= */
const scanScreen = document.getElementById("scan");
const resultScreen = document.getElementById("result");

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const hud = document.getElementById("hud");
const hctx = hud.getContext("2d");

const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");

const scoreEl = document.getElementById("score");
const resultTextEl = document.getElementById("resultText");
const phoneBtn = document.getElementById("phoneBtn");
const waBtn = document.getElementById("waBtn");

let stream = null;
let live = false;
let frozen = false;
let lastLandmarks = null;

/* ================= START ================= */
startBtn.onclick = async () => {
  if (stream) return;

  stream = await navigator.mediaDevices.getUserMedia({ video:true });
  video.srcObject = stream;
  await video.play();

  live = true;

  if (USE_AI) startFaceMesh();
  else requestAnimationFrame(localLoop);
};

/* ================= LOCAL FALLBACK ================= */
function localLoop(){
  if(!live || !video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  hud.width = canvas.width;
  hud.height = canvas.height;

  ctx.drawImage(video,0,0);
  drawLocalMesh();

  requestAnimationFrame(localLoop);
}

function drawLocalMesh(){
  hctx.clearRect(0,0,hud.width,hud.height);

  const cx = hud.width/2;
  const cy = hud.height/2;
  const rx = hud.width*0.3;
  const ry = rx*1.35;

  hctx.strokeStyle="#c9a86a";
  hctx.lineWidth=3;
  hctx.beginPath();
  hctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  hctx.stroke();

  hctx.save();
  hctx.beginPath();
  hctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  hctx.clip();

  hctx.strokeStyle="rgba(255,255,255,0.25)";
  hctx.lineWidth=1.2;

  for(let i=1;i<=16;i++){
    const t=i/16;
    const y=cy+(t*2-1)*ry;
    hctx.beginPath();
    hctx.ellipse(cx,y,rx*Math.sin(Math.PI*t),0.4,0,0,Math.PI*2);
    hctx.stroke();
  }

  hctx.restore();
}

/* ================= FACEMESH ================= */
function startFaceMesh(){
  const faceMesh = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });

  faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
  });

  faceMesh.onResults(onFaceResults);

  const cam = new Camera(video,{
    onFrame: async ()=>{
      if(!frozen) await faceMesh.send({image:video});
    },
    width:640,
    height:480
  });

  cam.start();
}

function onFaceResults(res){
  if(!res.multiFaceLandmarks.length) return;

  hud.width = video.videoWidth;
  hud.height = video.videoHeight;
  hctx.clearRect(0,0,hud.width,hud.height);

  lastLandmarks = res.multiFaceLandmarks[0];

  hctx.strokeStyle="rgba(255,255,255,0.35)";
  hctx.lineWidth=0.8;

  lastLandmarks.forEach(p=>{
    hctx.beginPath();
    hctx.arc(p.x*hud.width,p.y*hud.height,1.2,0,Math.PI*2);
    hctx.stroke();
  });
}

/* ================= CAPTURE ================= */
captureBtn.onclick = ()=>{
  frozen = true;

  const score = USE_AI ? 92 : 86;

  scoreEl.textContent = score;
  resultTextEl.innerHTML =
    `Ihre Haut erscheint gut ausgeglichen mit stabiler Struktur.<br>
     Leichte Sensitivität ist im Wangenbereich erkennbar.<br><br>
     Für eine gezielte Beratung empfehlen wir einen Termin bei <strong>Lune Beauty</strong>.`;

  phoneBtn.href = "tel:+491791544002";
  waBtn.href =
    "https://wa.me/491791544002?text=" +
    encodeURIComponent(
      `Hallo Lune Beauty, mein Haut‑Score beträgt ${score}. Ich möchte gern einen Termin vereinbaren.`
    );

  scanScreen.classList.remove("active");
  resultScreen.classList.add("active");
};
</script>

</body>
</html>
``
