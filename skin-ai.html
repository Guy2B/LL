<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lune Beauty – Premium AI Skin Scan</title>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a86a;
  --bg:#fffaf3;
  --ink:#2f2a24;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--ink);
  text-align:center;
}

#app{
  max-width:420px;
  margin:28px auto;
}

.badge{
  display:inline-block;
  padding:6px 16px;
  border-radius:999px;
  background:#f4efe7;
  color:#7a6a4f;
  font-size:12px;
}

/* ===== SCAN ===== */
#viewer{
  width:320px;
  height:320px;
  margin:18px auto;
  border-radius:50%;
  background:#000;
  border:3px solid var(--gold);
  overflow:hidden;
  position:relative;
  transition:all .6s cubic-bezier(.4,0,.2,1);
}
#viewer.morph{
  width:190px;
  height:250px;
  border-radius:18px;
}

video,canvas,img{
  width:100%;
  height:100%;
  object-fit:cover;
}

canvas{
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* Vignette im Ergebnis */
img{
  filter:contrast(1.03) brightness(1.02);
}
img::after{}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-top:14px;
}

button{
  padding:11px 24px;
  border-radius:18px;
  border:none;
  background:var(--gold);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button.secondary{
  background:#f2ebe2;
  color:#7a6a4f;
}
button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

/* ===== REPORT ===== */
#report{
  opacity:0;
  transform:translateY(36px);
  pointer-events:none;
  transition:.6s ease;
}
#report.active{
  opacity:1;
  transform:none;
  pointer-events:auto;
}

.score{
  font-size:54px;
  color:var(--gold);
  font-weight:600;
  margin:6px 0;
}

.zone{
  font-size:14px;
  color:#6b5c43;
  margin-bottom:6px;
}

/* ===== CTA ===== */
.premium-cta{
  margin-top:26px;
  padding:24px;
  border-radius:28px;
  background:linear-gradient(180deg,#fff,#faf6ef);
  box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.cta-buttons{
  display:flex;
  gap:14px;
  margin-top:16px;
}

.cta{
  flex:1;
  padding:14px 0;
  border-radius:18px;
  font-weight:600;
  text-decoration:none;
  color:#fff;
}
.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}

.meta{
  font-size:13px;
  color:#6b5c43;
  margin-top:14px;
  line-height:1.4;
}
</style>
</head>

<body>
<div id="app">

  <div class="badge">Advanced AI Skin Scan</div>

  <!-- Scan -->
  <div id="viewer">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="hud"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>

  <!-- Report -->
  <div id="report">
    <div class="badge">Ihr Haut‑Score</div>
    <div id="globalScore" class="score"></div>
    <div id="zoneScores" class="zone"></div>
    <p id="recommendation"></p>

    <div class="premium-cta">
      <strong>Individuelle Hautanalyse mit persönlicher Beratung</strong>
      <div class="cta-buttons">
        <a class="cta phone" href="tel:+491791544002">📞 Telefon</a>
        <a class="cta whatsapp" id="waBtn" target="_blank">💬 WhatsApp</a>
      </div>
      <div class="meta">
        Mo–Fr 10–18 Uhr · Sa 10–16 Uhr<br>
        <a href="https://www.lunebeauty.de" target="_blank">www.lunebeauty.de</a>
      </div>
    </div>

    <div class="controls">
      <button class="secondary" onclick="location.reload()">Neue Aufnahme</button>
    </div>
  </div>

</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const hud = document.getElementById("hud");
const viewer = document.getElementById("viewer");
const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");
const report = document.getElementById("report");

let stream, faceMesh, cameraMP, captured=false;

/* ===== PREMIUM TEXTE ===== */
const TEXT = {
  excellent: `Ihre Haut zeigt eine sehr ausgewogene, stabile Struktur mit hoher Widerstandsfähigkeit.
Die Hautoberfläche wirkt ruhig, ebenmäßig und gut durchfeuchtet.

Eine präventive, zellstimulierende Behandlung unterstützt den langfristigen Erhalt
dieses Hautzustands auf hohem Niveau.`,
  good: `Die Hautqualität ist insgesamt gut, zeigt jedoch dezente Hinweise auf
Strukturunruhe und wechselnde Feuchtigkeitsbalance.

Eine gezielte, individuell abgestimmte Behandlung ist sinnvoll,
um die Hautoberfläche nachhaltig zu harmonisieren.`,
  attention: `Es zeigen sich deutliche Hinweise auf eine gestörte Hautbalance
und erhöhte Reaktivität einzelner Hautareale.

Eine intensiv ausgleichende, beruhigende Behandlung wird empfohlen,
um die Hautfunktion langfristig zu stabilisieren.`
};

/* ===== FACE MESH MIT ZONENFARBEN ===== */
function zoneColor(idx){
  if(idx < 60) return "rgba(218,180,125,.75)";       // Stirn
  if(idx < 220) return "rgba(180,200,220,.75)";     // Wangen
  return "rgba(190,160,160,.75)";                   // Kinn
}

function onFace(res){
  if(captured) return;

  const ctx = hud.getContext("2d");
  hud.width = hud.clientWidth;
  hud.height = hud.clientHeight;
  ctx.clearRect(0,0,hud.width,hud.height);

  if(!res.multiFaceLandmarks){
    captureBtn.disabled = true;
    return;
  }

  captureBtn.disabled = false;

  const lm = res.multiFaceLandmarks[0];
  const T = FACEMESH_TESSELATION;

  for(const [a,b] of T){
    ctx.strokeStyle = zoneColor(a);
    ctx.lineWidth = 0.45;
    ctx.beginPath();
    ctx.moveTo(lm[a].x*hud.width, lm[a].y*hud.height);
    ctx.lineTo(lm[b].x*hud.width, lm[b].y*hud.height);
    ctx.stroke();
  }
}

/* ===== START ===== */
startBtn.onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
  startBtn.disabled = true;

  faceMesh = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:.6,
    minTrackingConfidence:.6
  });
  faceMesh.onResults(onFace);

  cameraMP = new Camera(video, {
    onFrame: () => !captured && faceMesh.send({image:video})
  });
  cameraMP.start();
};

/* ===== ANALYSE ===== */
function analyze(img){
  const c=document.createElement("canvas");
  c.width=img.width; c.height=img.height;
  const x=c.getContext("2d");
  x.drawImage(img,0,0);
  const d=x.getImageData(0,0,c.width,c.height).data;

  let r=0;
  for(let i=0;i<d.length;i+=4)
    r += Math.max(0,d[i]-d[i+1]);

  r/=d.length/4;
  return Math.round(100 - Math.min(40, r*1.4));
}

/* ===== CAPTURE ===== */
captureBtn.onclick = () => {
  if(captured) return;
  captured = true;

  const snap=document.createElement("canvas");
  snap.width=video.videoWidth;
  snap.height=video.videoHeight;
  const ctx=snap.getContext("2d");
  ctx.drawImage(video,0,0);
  ctx.drawImage(hud,0,0);

  stream.getTracks().forEach(t=>t.stop());
  cameraMP.stop();

  const img=new Image();
  img.src=snap.toDataURL();
  img.onload=()=>{
    viewer.innerHTML="";
    viewer.appendChild(img);
    viewer.classList.add("morph");

    const score=analyze(img);
    const cat = score>=88?"excellent":score>=75?"good":"attention";

    document.getElementById("globalScore").textContent = score;
    document.getElementById("zoneScores").textContent =
      "Stirn 88 · Wangen 84 · Kinn 86";
    document.getElementById("recommendation").textContent = TEXT[cat];
    document.getElementById("waBtn").href =
      `https://wa.me/491791544002?text=Mein%20Skin%20Score%20ist%20${score}`;

    report.classList.add("active");
  };
};
</script>

</body>
</html>
``
