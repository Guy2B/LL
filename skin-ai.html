<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lune Beauty – Advanced AI Skin Scan</title>

<!-- FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a86a;
  --bg:#fffaf3;
  --ink:#2f2a24;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--ink);
  text-align:center;
}

#app{
  max-width:420px;
  margin:24px auto;
}

.badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  background:#f4efe7;
  color:#7a6a4f;
  font-size:12px;
  margin-bottom:12px;
}

/* ===== SCAN ===== */
#viewer{
  width:320px;
  height:320px;
  margin:16px auto;
  border-radius:50%;
  background:#000;
  border:3px solid var(--gold);
  overflow:hidden;
  position:relative;
  transition:.6s;
}
#viewer.morph{
  width:180px;
  height:240px;
  border-radius:18px;
}

video,canvas,img{
  width:100%;
  height:100%;
  object-fit:cover;
}

canvas{
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-top:16px;
}

button{
  padding:11px 22px;
  border-radius:18px;
  border:none;
  background:var(--gold);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button.secondary{
  background:#f2ebe2;
  color:#7a6a4f;
}
button:disabled{opacity:.4;cursor:not-allowed}

/* ===== REPORT ===== */
#report{
  opacity:0;
  transform:translateY(40px);
  pointer-events:none;
  transition:.6s;
}
#report.active{
  opacity:1;
  transform:none;
  pointer-events:auto;
}

.score{
  font-size:52px;
  color:var(--gold);
  font-weight:600;
}
.zone{
  font-size:14px;
  opacity:.85;
  margin-bottom:6px;
}

/* ===== CTA ===== */
.premium-cta{
  margin-top:24px;
  padding:22px;
  border-radius:28px;
  background:linear-gradient(180deg,#fff,#faf6ef);
  box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.cta-buttons{
  display:flex;
  gap:14px;
  margin-top:14px;
}

.cta{
  flex:1;
  padding:14px 0;
  border-radius:18px;
  font-weight:600;
  text-decoration:none;
  color:#fff;
}

.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}

.meta{
  font-size:13px;
  color:#6b5c43;
  margin-top:14px;
}
</style>
</head>

<body>

<div id="app">

  <div class="badge">Advanced AI Skin Scan</div>

  <!-- SCAN -->
  <div id="viewer">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="hud"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>

  <!-- REPORT -->
  <div id="report">
    <div class="badge">Ihr Haut‑Score</div>
    <div id="globalScore" class="score"></div>
    <div id="zoneScores" class="zone"></div>
    <p id="recommendation"></p>

    <div class="premium-cta">
      <strong>Persönliche Hautberatung</strong>
      <div class="cta-buttons">
        <a class="cta phone" href="tel:+491791544002">📞 Telefon</a>
        <a class="cta whatsapp" id="waBtn" target="_blank">💬 WhatsApp</a>
      </div>
      <div class="meta">
        Mo–Fr 10–18 Uhr · Sa 10–16 Uhr<br>
        <a href="https://www.lunebeauty.de">www.lunebeauty.de</a>
      </div>
    </div>

    <div class="controls">
      <button class="secondary" onclick="location.reload()">Neue Aufnahme</button>
    </div>
  </div>

</div>

<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video=document.getElementById("video");
const hud=document.getElementById("hud");
const viewer=document.getElementById("viewer");
const startBtn=document.getElementById("startBtn");
const captureBtn=document.getElementById("captureBtn");
const report=document.getElementById("report");

let stream, faceMesh, cameraMP, captured=false;

/* ===== PREMIUM EMPFEHLUNGEN ===== */
const RECOMMENDATIONS={
  excellent:`Ihre Haut zeigt eine sehr ausgeglichene Struktur mit hoher Widerstandsfähigkeit.
Die Hautoberfläche wirkt ruhig, ebenmäßig und gut durchfeuchtet.

Für den langfristigen Erhalt dieses Hautzustands empfehlen wir eine präventive,
zellstimulierende Premium‑Behandlung mit Fokus auf Hautbarriere und Regeneration.`,

  good:`Die Hautqualität ist insgesamt gut, zeigt jedoch leichte Hinweise auf
Strukturunruhe und wechselnde Feuchtigkeitsbalance.

Eine gezielte Behandlung zur Harmonisierung der Hautoberfläche und Stabilisierung
der Hautfunktion kann das Hautbild sichtbar verfeinern.`,

  attention:`Es zeigen sich deutliche Hinweise auf eine gestörte Hautbalance
und erhöhte Reaktivität einzelner Hautareale.

Wir empfehlen eine intensiv ausgleichende, beruhigende Behandlung,
um die Hautbarriere nachhaltig zu stabilisieren.`
};

function category(score){
  return score>=88?"excellent":score>=75?"good":"attention";
}

/* ===== FACE MESH ===== */
function onFace(res){
  if(captured) return;

  const ctx=hud.getContext("2d");
  hud.width=hud.clientWidth;
  hud.height=hud.clientHeight;
  ctx.clearRect(0,0,hud.width,hud.height);

  if(!res.multiFaceLandmarks){
    captureBtn.disabled=true;
    return;
  }

  captureBtn.disabled=false;
  const lm=res.multiFaceLandmarks[0];
  ctx.strokeStyle="rgba(201,168,106,.65)";
  ctx.lineWidth=.5;

  for(let i=0;i<lm.length-1;i++){
    ctx.beginPath();
    ctx.moveTo(lm[i].x*hud.width,lm[i].y*hud.height);
    ctx.lineTo(lm[i+1].x*hud.width,lm[i+1].y*hud.height);
    ctx.stroke();
  }
}

/* ===== START ===== */
startBtn.onclick=async()=>{
  stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
  startBtn.disabled=true;

  faceMesh=new FaceMesh({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:.6,
    minTrackingConfidence:.6
  });
  faceMesh.onResults(onFace);

  cameraMP=new Camera(video,{
    onFrame:()=>!captured&&faceMesh.send({image:video})
  });
  cameraMP.start();
};

/* ===== ANALYSE ===== */
function analyze(image){
  const c=document.createElement("canvas");
  c.width=image.width;c.height=image.height;
  const x=c.getContext("2d");
  x.drawImage(image,0,0);
  const d=x.getImageData(0,0,c.width,c.height).data;
  let r=0,l=0;
  for(let i=0;i<d.length;i+=4){
    r+=Math.max(0,d[i]-d[i+1]);
    l+=(0.2126*d[i]+0.7152*d[i+1]+0.0722*d[i+2]);
  }
  r/=d.length/4;
  l/=d.length/4;
  return Math.round(100-Math.min(40,r*1.4+l/6));
}

/* ===== CAPTURE ===== */
captureBtn.onclick=()=>{
  if(captured) return;
  captured=true;

  const snap=document.createElement("canvas");
  snap.width=video.videoWidth;
  snap.height=video.videoHeight;
  const ctx=snap.getContext("2d");
  ctx.drawImage(video,0,0);
  ctx.drawImage(hud,0,0,snap.width,snap.height);

  stream.getTracks().forEach(t=>t.stop());
  cameraMP.stop();

  const img=new Image();
  img.src=snap.toDataURL();
  img.onload=()=>{
    viewer.innerHTML="";
    viewer.appendChild(img);
    viewer.classList.add("morph");

    const score=analyze(img);
    document.getElementById("globalScore").textContent=score;
    document.getElementById("zoneScores").textContent="Stirn 88 · Wangen 84 · Kinn 86";
    document.getElementById("recommendation").textContent=RECOMMENDATIONS[category(score)];
    document.getElementById("waBtn").href=
      `https://wa.me/491791544002?text=Mein%20Skin%20Score%20ist%20${score}`;

    report.classList.add("active");
  };
};
</script>

</body>
</html>
``
