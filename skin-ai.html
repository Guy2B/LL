<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Lune Beauty – Hautanalyse</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
/* ================= BASE ================= */
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#fffaf3;
  color:#2f2a24;
}
#app{
  max-width:420px;
  margin:24px auto 72px;
  padding:0 14px;
  text-align:center;
}
.screen{display:none;opacity:0;transform:scale(.98);transition:.45s}
.screen.active{display:block;opacity:1;transform:scale(1)}

/* ================= COMMON ================= */
.badge{
  padding:6px 16px;
  border-radius:999px;
  background:#f4efe7;
  color:#7a6a4f;
  font-size:12px;
  margin-bottom:14px;
  display:inline-block;
}
h1{
  font-family:"Playfair Display";
  font-size:22px;
  margin:6px 0 10px;
}
.helper{
  font-size:14px;
  color:#6b5c43;
  line-height:1.45;
  margin-bottom:12px;
}

/* ================= CAMERA ================= */
#cameraCircle{
  width:320px;
  height:320px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  position:relative;
  background:#000;
  border:3px solid;
  border-image:linear-gradient(135deg,#c9a86a,#efd8d1) 1;
}
video,canvas{width:100%;height:100%;object-fit:cover}

#hud{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.6;
}

/* ================= CONTROLS ================= */
.controls{margin-top:16px}
button{
  padding:14px 26px;
  border-radius:20px;
  border:none;
  background:linear-gradient(135deg,#c9a86a,#e2c994);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 10px 26px rgba(0,0,0,.12);
}
button.secondary{
  margin-top:14px;
  background:#f2ebe2;
  color:#7a6a4f;
  box-shadow:none;
}

/* ================= RESULT ================= */
.report-hero{
  display:grid;
  grid-template-columns:1fr 150px;
  gap:18px;
  align-items:center;
  margin:12px 0 6px;
}
.report-image{
  width:230px;
  height:300px;
  border-radius:34px;
  overflow:hidden;
  background:#f4efe7;
  margin:0 auto;
  box-shadow:0 16px 40px rgba(0,0,0,.18);
}
.report-image canvas{
  opacity:0;
  transform:scale(.9);
  transition:.6s ease;
}
.report-image canvas.visible{
  opacity:1;
  transform:scale(1);
}

/* SCORE */
#scoreWrap{
  position:relative;
  width:150px;
  height:150px;
  margin:auto;
}
#scoreWrap canvas{position:absolute;inset:0}
#score{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Playfair Display";
  font-size:46px;
  font-weight:600;
  color:#c9a86a;
}
.score-label{
  font-size:12px;
  color:#6b5c43;
  margin-top:6px;
}

/* SUBSCORES */
.subscores{
  margin:14px;
  text-align:left;
}
.sub{
  display:grid;
  grid-template-columns:120px 1fr 36px;
  gap:10px;
  font-size:13px;
  color:#6b5c43;
  margin-bottom:8px;
}
.bar{
  height:6px;
  background:#f0e6d6;
  border-radius:6px;
  overflow:hidden;
}
.bar span{
  display:block;
  height:100%;
  background:linear-gradient(90deg,#c9a86a,#efd8d1);
}

/* CTA */
.cta-soft{
  margin-top:10px;
  padding:22px;
  border-radius:26px;
  background:#fff;
  box-shadow:0 18px 44px rgba(0,0,0,.1);
}
.cta-soft h3{
  font-family:"Playfair Display";
  font-size:18px;
  margin:0 0 6px;
}
.cta-soft p{
  font-size:13px;
  color:#6b5c43;
  margin-bottom:16px;
}
.cta-buttons{
  display:flex;
  gap:12px;
}
.cta-btn{
  flex:1;
  padding:14px;
  border-radius:18px;
  font-weight:600;
  color:#fff;
  text-decoration:none;
}
.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}
</style>
</head>

<body>
<div id="app">

<!-- ================= SCAN ================= -->
<div id="scan" class="screen active">
  <div class="badge">Professionelle Hautanalyse</div>
  <h1>Bereiten Sie Ihr Gesicht vor</h1>
  <div class="helper">Gleichmäßiges Licht · Ohne Make‑up empfohlen</div>

  <div id="cameraCircle">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="hud"></canvas>
  </div>

  <div class="controls">
    <button id="startBtn">Analyse starten</button>
    <button id="captureBtn" disabled>Analyse abschließen</button>
  </div>
</div>

<!-- ================= RESULT ================= -->
<div id="result" class="screen">
  <div class="badge">Persönlicher Hautbericht</div>

  <div class="report-hero">
    <div class="report-image">
      <canvas id="finalImage"></canvas>
    </div>
    <div>
      <div id="scoreWrap">
        <canvas id="scoreRing" width="150" height="150"></canvas>
        <div id="score"></div>
      </div>
      <div class="score-label">Gesamthautzustand</div>
    </div>
  </div>

  <div class="subscores" id="subs"></div>

  <div class="result-text" id="resultText"></div>

  <div class="cta-soft">
    <h3><a id="serviceLink" target="_blank"></a></h3>
    <p id="serviceText"></p>
    <div class="cta-buttons">
      <a class="cta-btn phone" href="tel:+491791544002">📞 Anrufen</a>
      <a class="cta-btn whatsapp" href="https://wa.me/491791544002">💬 WhatsApp</a>
    </div>
  </div>

  <button class="secondary" onclick="location.reload()">Neue Analyse</button>
</div>

</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video=document.getElementById("video");
const hud=document.getElementById("hud");
const hctx=hud.getContext("2d");
const finalCanvas=document.getElementById("finalImage");
const fctx=finalCanvas.getContext("2d");
const startBtn=document.getElementById("startBtn");
const captureBtn=document.getElementById("captureBtn");

let stream, cam, lastLandmarks;

const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
const round=v=>Math.round(v);

function drawMesh(lm,w,h){
  hctx.clearRect(0,0,w,h);
  hctx.strokeStyle="rgba(255,255,255,.6)";
  hctx.lineWidth=.8;
  FACEMESH_TESSELATION.forEach(([a,b])=>{
    const p1=lm[a],p2=lm[b];
    hctx.beginPath();
    hctx.moveTo(p1.x*w,p1.y*h);
    hctx.lineTo(p2.x*w,p2.y*h);
    hctx.stroke();
  });
}

startBtn.onclick=async()=>{
  stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
  await video.play();

  const mesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  mesh.setOptions({maxNumFaces:1,refineLandmarks:true});
  mesh.onResults(r=>{
    if(!r.multiFaceLandmarks?.length)return;
    lastLandmarks=r.multiFaceLandmarks[0];
    hud.width=video.videoWidth;
    hud.height=video.videoHeight;
    drawMesh(lastLandmarks,hud.width,hud.height);
    captureBtn.disabled=false;
  });
  cam=new Camera(video,{onFrame:()=>mesh.send({image:video})});
  cam.start();
};

captureBtn.onclick=()=>finalize();

function finalize(){
  const W=230,H=300;
  finalCanvas.width=W;
  finalCanvas.height=H;

  // IMPORTANT: draw frame BEFORE stopping camera
  const vw=video.videoWidth, vh=video.videoHeight;
  const tr=W/H, sr=vw/vh;
  let sx,sy,sw,sh;
  if(sr>tr){sh=vh;sw=vh*tr;sx=(vw-sw)/2;sy=0;}
  else{sw=vw;sh=vw/tr;sx=0;sy=(vh-sh)/2;}

  fctx.drawImage(video,sx,sy,sw,sh,0,0,W,H);
  fctx.drawImage(hud,sx,sy,sw,sh,0,0,W,H);

  stream.getTracks().forEach(t=>t.stop());
  cam.stop();

  document.getElementById("scan").classList.remove("active");
  document.getElementById("result").classList.add("active");
  finalCanvas.classList.add("visible");

  runAnalysis();
}

function sub(label,val){
  const v=round(val);
  return `<div class="sub"><div>${label}</div><div class="bar"><span style="width:${v}%"></span></div><div>${v}</div></div>`;
}

function runAnalysis(){
  const sym=clamp(100-Math.abs(lastLandmarks[33].x-lastLandmarks[263].x)*120,65,100);
  const eye=clamp(Math.abs(lastLandmarks[159].y-lastLandmarks[145].y)*900,60,100);
  const uni=70, tex=75;

  document.getElementById("subs").innerHTML=
    sub("Symmetrie",sym)+sub("Hautgleichmäßigkeit",uni)+sub("Textur",tex)+sub("Augenfrische",eye);

  const score=round((sym+uni+tex+eye)/4);
  drawScore(score);

  let text, service;
  if(score>=80){text="Sehr ausgewogene Hautstruktur.";service="Signature Facial";}
  else if(score>=70){text="Stabile Basis mit gezielten Optimierungsmöglichkeiten.";service="Skin Balance Treatment";}
  else{text="Erhöhter Regenerationsbedarf in ausgewählten Arealen.";service="Regeneration & Recovery Program";}

  document.getElementById("resultText").innerHTML="<strong>Analyseergebnis:</strong><br>"+text;
  document.getElementById("serviceLink").textContent="Empfohlene Behandlung: "+service;
  document.getElementById("serviceLink").href="https://www.lunebeauty.de";
  document.getElementById("serviceText").textContent="Diese Behandlung wurde anhand Ihrer individuellen Hautanalyse ausgewählt.";
}

function drawScore(val){
  const ctx=document.getElementById("scoreRing").getContext("2d");
  let p=0;
  (function loop(){
    ctx.clearRect(0,0,150,150);
    ctx.lineWidth=12;
    ctx.strokeStyle="#eee2d0";
    ctx.beginPath();ctx.arc(75,75,65,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle="#c9a86a";
    ctx.beginPath();ctx.arc(75,75,65,-Math.PI/2,(p/100)*Math.PI*2-Math.PI/2);ctx.stroke();
    p+=(val-p)*0.1;
    document.getElementById("score").textContent=Math.round(p);
    if(Math.abs(val-p)>0.5)requestAnimationFrame(loop);
  })();
}
</script>
</body>
</html>
