<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lune Beauty – AI Skin Scan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a86a;
  --gold-soft:rgba(201,168,106,.3);
  --bg:#fffaf3;
  --ink:#2f2a24;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--ink);
  text-align:center;
}

#app{
  max-width:420px;
  margin:32px auto 64px;
}

/* ===== BADGE ===== */
.badge{
  display:inline-block;
  padding:6px 16px;
  border-radius:999px;
  background:rgba(201,168,106,.16);
  color:#6f5d3d;
  font-size:12px;
  margin-bottom:20px;
}

/* ===== VIEWER ===== */
#viewer{
  width:300px;
  height:300px;
  margin:0 auto 20px;
  border-radius:26px;
  background:#000;
  border:2px solid var(--gold);
  overflow:hidden;
  position:relative;
  transition:.6s ease;
}

#viewer.morph{
  width:180px;
  height:240px;
}

/* media */
video,canvas,img{
  width:100%;
  height:100%;
  object-fit:cover;
}
canvas{
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  gap:14px;
  justify-content:center;
  margin-bottom:16px;
}

button{
  padding:12px 26px;
  border-radius:999px;
  border:none;
  background:var(--gold);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button:disabled{opacity:.45}

/* ===== REPORT ===== */
#report{
  opacity:0;
  transform:translateY(32px);
  transition:.6s ease;
  pointer-events:none;
}
#report.active{
  opacity:1;
  transform:none;
  pointer-events:auto;
}

.score{
  font-family:"Playfair Display",serif;
  font-size:56px;
  color:var(--gold);
  margin:12px 0 6px;
}

/* ===== ZONES ===== */
.zones{
  max-width:260px;
  margin:18px auto 14px;
}
.zone-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:8px 0;
}
.zone-row span{
  width:70px;
  font-size:13px;
}
.bar{
  flex:1;
  height:8px;
  background:#eee4d6;
  border-radius:999px;
  overflow:hidden;
}
.fill{
  height:100%;
  background:var(--gold);
  width:0;
  transition:1s ease;
}

/* ===== CTA ===== */
.premium-cta{
  margin-top:22px;
  padding:24px;
  border-radius:26px;
  background:linear-gradient(180deg,#fff,#faf6ef);
  box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.premium-cta strong{
  font-family:"Playfair Display",serif;
  font-size:18px;
}

.cta-buttons{
  display:flex;
  gap:14px;
  margin-top:14px;
}
.cta{
  flex:1;
  padding:14px 0;
  border-radius:18px;
  font-weight:600;
  color:#fff;
  text-decoration:none;
}
.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}

.meta{
  font-size:12px;
  color:#6b5c43;
  margin-top:12px;
}
</style>
</head>

<body>
<div id="app">

  <div class="badge">Advanced AI Skin Scan</div>

  <!-- VIEWER -->
  <div id="viewer">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="hud"></canvas>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="captureBtn" disabled>Capture</button>
  </div>

  <!-- REPORT -->
  <div id="report">
    <div class="badge">Ihr Haut‑Score</div>
    <div id="score" class="score">88</div>

    <!-- ZONES -->
    <div class="zones">
      <div class="zone-row"><span>Stirn</span><div class="bar"><div id="z1" class="fill"></div></div></div>
      <div class="zone-row"><span>Wangen</span><div class="bar"><div id="z2" class="fill"></div></div></div>
      <div class="zone-row"><span>Kinn</span><div class="bar"><div id="z3" class="fill"></div></div></div>
    </div>

    <p id="rec">Sehr guter Hautzustand – ideal für präventive Premium‑Behandlung.</p>

    <!-- CTA -->
    <div class="premium-cta">
      <strong>Individueller Behandlungsplan</strong>
      <div class="cta-buttons">
        <a class="cta phone" href="tel:+491791544002">📞 Telefon</a>
        <a class="cta whatsapp" id="waBtn" target="_blank">💬 WhatsApp</a>
      </div>
      <div class="meta">
        Mo–Fr 10–18 · Sa 10–16<br>
        www.lunebeauty.de
      </div>
    </div>

    <div class="controls">
      <button id="restartBtn">Neue Analyse</button>
    </div>
  </div>

</div>

<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const hud = document.getElementById("hud");
const viewer = document.getElementById("viewer");
const startBtn = document.getElementById("startBtn");
const captureBtn = document.getElementById("captureBtn");
const report = document.getElementById("report");

let stream, faceMesh, cam, captured=false, lastLandmarks=null;
let scans = 0;

const T = window.FACEMESH_TESSELATION;

/* LIVE MESH (UNCHANGED & WORKING) */
function onFace(res){
  if(captured) return;

  const ctx = hud.getContext("2d");
  hud.width = hud.clientWidth;
  hud.height = hud.clientHeight;
  ctx.clearRect(0,0,hud.width,hud.height);

  if(!res.multiFaceLandmarks){
    captureBtn.disabled = true;
    return;
  }

  captureBtn.disabled = false;
  lastLandmarks = res.multiFaceLandmarks[0];
  ctx.strokeStyle = "rgba(201,168,106,.9)";
  ctx.lineWidth = .6;

  T.forEach(([a,b])=>{
    const p1 = lastLandmarks[a];
    const p2 = lastLandmarks[b];
    ctx.beginPath();
    ctx.moveTo(p1.x*hud.width,p1.y*hud.height);
    ctx.lineTo(p2.x*hud.width,p2.y*hud.height);
    ctx.stroke();
  });
}

startBtn.onclick = async ()=>{
  stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;

  faceMesh = new FaceMesh({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true });
  faceMesh.onResults(onFace);

  cam = new Camera(video,{ onFrame:()=>!captured && faceMesh.send({image:video}) });
  cam.start();
};

/* CAPTURE + NORMALIZE */
captureBtn.onclick = ()=>{
  captured = true;

  const w=hud.width,h=hud.height;
  const xs=lastLandmarks.map(p=>p.x*w);
  const ys=lastLandmarks.map(p=>p.y*h);

  let minX=Math.min(...xs),maxX=Math.max(...xs);
  let minY=Math.min(...ys),maxY=Math.max(...ys);
  const pad=28;

  const snap=document.createElement("canvas");
  snap.width=maxX-minX+pad*2;
  snap.height=maxY-minY+pad*2;

  const sctx=snap.getContext("2d");
  sctx.drawImage(
    video,
    (minX-pad)/w*video.videoWidth,
    (minY-pad)/h*video.videoHeight,
    snap.width/w*video.videoWidth,
    snap.height/h*video.videoHeight,
    0,0,snap.width,snap.height
  );
  sctx.drawImage(hud,minX-pad,minY-pad,snap.width,snap.height,0,0,snap.width,snap.height);

  stream.getTracks().forEach(t=>t.stop());
  cam.stop();

  viewer.innerHTML="";
  const img=new Image();
  img.src=snap.toDataURL();
  viewer.appendChild(img);
  viewer.classList.add("morph");

  // animate bars
  z1.style.width="88%";
  z2.style.width="84%";
  z3.style.width="86%";

  waBtn.href=`https://wa.me/491791544002?text=Mein%20Skin%20Score%20ist%2088`;

  report.classList.add("active");
};

/* RESTART / LIMIT */
restartBtn.onclick = ()=>{
  scans++;
  scans>=2 ? location.href="https://www.lunebeauty.de" : location.reload();
};
</script>

</body>
</html>
``
