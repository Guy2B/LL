<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lune Beauty – Advanced AI Skin Scan</title>

<!-- ✅ Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a86a;
  --bg:#fffaf3;
  --ink:#2f2a24;
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--ink);
}

#app{
  max-width:420px;
  margin:24px auto;
  text-align:center;
}

.badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  background:#f4efe7;
  color:#7a6a4f;
  font-size:12px;
  margin-bottom:14px;
}

/* ===== SCAN STAGE ===== */
#scanStage{ transition:.6s ease }
#scanStage.hidden{
  opacity:0;
  height:0;
  overflow:hidden;
  pointer-events:none;
}

#camWrap{
  width:320px;
  height:320px;
  margin:0 auto;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  background:black;
  border:3px solid var(--gold);
  transition:width .6s,height .6s,border-radius .6s;
}

#camWrap.morph{
  width:180px;
  height:240px;
  border-radius:18px;
}

video,canvas,img{
  width:100%;
  height:100%;
  object-fit:cover;
}

canvas{
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* ===== HUD ===== */
#arrow{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:42px;
  color:white;
  text-shadow:0 0 14px rgba(0,0,0,.6);
}

/* ===== CONTROLS ===== */
.controls{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-top:16px;
}

button{
  padding:11px 20px;
  border-radius:18px;
  border:none;
  background:var(--gold);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button.secondary{
  background:#f2ebe2;
  color:#7a6a4f;
}

button:disabled{
  opacity:.4;
  cursor:not-allowed;
}

/* ===== RESULT ===== */
#result{
  opacity:0;
  transform:translateY(40px);
  pointer-events:none;
  transition:.6s ease;
}

#result.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.result-layout{
  display:flex;
  gap:16px;
  margin-top:20px;
}

.result-img{
  width:180px;
  height:240px;
  overflow:hidden;
}

#score{
  font-size:48px;
  color:var(--gold);
  font-weight:600;
}

/* ===== CTA ===== */
.premium-cta{
  background:linear-gradient(180deg,#fff,#faf6ef);
  border-radius:28px;
  padding:22px;
  box-shadow:0 18px 40px rgba(0,0,0,.12);
  margin-top:22px;
}

.cta-buttons{
  display:flex;
  gap:14px;
}

.cta{
  flex:1;
  text-align:center;
  padding:14px 0;
  border-radius:18px;
  font-weight:600;
  color:white;
  text-decoration:none;
}

.phone{background:linear-gradient(135deg,#c9a86a,#efd8d1)}
.whatsapp{background:#1dbf5f}

.meta{
  font-size:13px;
  color:#6b5c43;
  margin-top:14px;
  line-height:1.5;
}
</style>
</head>

<body>
<div id="app">

  <div class="badge">Advanced AI Skin Scan</div>

  <!-- ===== SCAN ===== -->
  <div id="scanStage">
    <div id="camWrap">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="hud"></canvas>
      <div id="arrow">↑</div>
    </div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="captureBtn" disabled>Capture</button>
    </div>
  </div>

  <!-- ===== RESULT ===== -->
  <div id="result">
    <div class="badge">Ihr Haut‑Score</div>

    <div class="result-layout">
      <div class="result-img" id="morphTarget"></div>
      <div>
        <div id="score">86</div>
        <div>Stirn: 88</div>
        <div>Wangen: 84</div>
        <div>Kinn: 86</div>
        <p>
          Ihre Haut zeigt eine ausgewogene Struktur mit leichter
          Sensitivität im Wangenbereich.
        </p>
      </div>
    </div>

    <div class="premium-cta">
      <div class="cta-buttons">
        <a href="tel:+491791544002" class="cta phone">Telefon</a>
        <a href="https://wa.me/491791544002" class="cta whatsapp">WhatsApp</a>
      </div>
      <div class="meta">
        Öffnungszeiten: Mo–Fr 10–18 Uhr · Sa 10–16 Uhr<br>
        <a href="https://www.lunebeauty.de">www.lunebeauty.de</a>
      </div>
    </div>

    <div class="controls">
      <button class="secondary" onclick="location.reload()">Neue Aufnahme</button>
      <button class="secondary" onclick="location.href='https://www.lunebeauty.de'sh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video=document.getElementById("video");
const startBtn=document.getElementById("startBtn");
const captureBtn=document.getElementById("captureBtn");
const camWrap=document.getElementById("camWrap");
const scanStage=document.getElementById("scanStage");
const morphTarget=document.getElementById("morphTarget");
const result=document.getElementById("result");
const hud=document.getElementById("hud");
const arrow=document.getElementById("arrow");

let stream, faceMesh, cameraMP;

const MESH=[
  [127,34],[34,139],[139,127],
  [11,0],[0,37],[37,11],
  [232,231],[231,120],[120,232]
];

function onFaceResults(res){
  const ctx=hud.getContext("2d");
  hud.width=hud.clientWidth;
  hud.height=hud.clientHeight;
  ctx.clearRect(0,0,hud.width,hud.height);

  ctx.strokeStyle="rgba(201,168,106,.4)";
  ctx.lineWidth=1.4;
  ctx.beginPath();
  ctx.arc(hud.width/2,hud.height/2,hud.width/2-10,0,Math.PI*2);
  ctx.stroke();

  if(!res.multiFaceLandmarks){
    captureBtn.disabled=true;
    return;
  }

  captureBtn.disabled=false;
  arrow.style.display="flex";

  ctx.lineWidth=.6;
  ctx.strokeStyle="rgba(201,168,106,.7)";
  res.multiFaceLandmarks.forEach(lm=>{
    MESH.forEach(([i,j])=>{
      ctx.beginPath();
      ctx.moveTo(lm[i].x*hud.width,lm[i].y*hud.height);
      ctx.lineTo(lm[j].x*hud.width,lm[j].y*hud.height);
      ctx.stroke();
    });
  });
}

startBtn.onclick=async()=>{
  stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;

  faceMesh=new FaceMesh({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:.6,
    minTrackingConfidence:.6
  });
  faceMesh.onResults(onFaceResults);

  cameraMP=new Camera(video,{onFrame:async()=>{
    await faceMesh.send({image:video});
  }});

  await cameraMP.start();
};

captureBtn.onclick=()=>{
  const snap=document.createElement("canvas");
  snap.width=video.videoWidth;
  snap.height=video.videoHeight;
  const sctx=snap.getContext("2d");
  sctx.drawImage(video,0,0);
  sctx.drawImage(hud,0,0,snap.width,snap.height);

  stream.getTracks().forEach(t=>t.stop());

  const img=document.createElement("img");
  img.src=snap.toDataURL();

  camWrap.innerHTML="";
  camWrap.appendChild(img);
  camWrap.classList.add("morph");
  morphTarget.appendChild(camWrap);

  scanStage.classList.add("hidden");
  result.classList.add("active");
};
</script>
</body>
</html>
